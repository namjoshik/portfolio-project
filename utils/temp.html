<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .content {
            display: flex;
            align-items: center;
            gap: 20px; /* Adjusts the space between the image and text */
        }
        img {
            max-width: 100px; /* Adjusts the size of the image */
            height: auto;
        }
    </style>
    <title>Image and Summary</title>
</head>
<body>
    <div class="container">
        <div class="content">
            <img src="../public/img/profile_image.png" alt="Image">
            <div class="summary">
                <p>This is the summary text placed next to the image.</p>
            </div>
        </div>
    </div>
</body>
</html>
